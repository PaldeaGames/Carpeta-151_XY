<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>151 XY — Paldea Games</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d1a;--surf:#141428;--surf2:#1c1c38;--brd:rgba(255,255,255,0.08);--brd2:rgba(255,255,255,0.15);--acc:#7c5cbf;--gold:#e8c84a;--rev:#ff6b35;--tx:#e8e6f0;--txm:#8885a8;--red:#ff4d4d;--accent:#e8ff47;--accent-dim:rgba(232,255,71,0.12);--accent-text:#0d0d0f;--radius:10px;--radius-sm:7px;--green:#47ffb2}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:15px}
#fixed-top{position:fixed;top:0;left:0;right:0;z-index:150;background:var(--bg)}
header{background:linear-gradient(135deg,#0d0d1a,#1a0d2e);border-bottom:2px solid var(--acc);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.head-left{display:flex;align-items:center;gap:14px}
.brand-icon img{width:38px;height:38px;object-fit:contain}
header h1{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800}
header p{font-size:.72rem;color:var(--txm);margin-top:1px}
.head-cart-btn{background:var(--accent);color:var(--accent-text);border:none;border-radius:50px;padding:10px 16px 10px 14px;font-family:'Syne',sans-serif;font-size:.85rem;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 2px 12px rgba(232,255,71,.3);transition:all .2s;flex-shrink:0;position:relative}
.head-cart-btn:hover{transform:translateY(-1px)}
.head-cart-btn svg{width:19px;height:19px}
.cart-count{position:absolute;top:-7px;right:-7px;background:var(--red);color:#fff;border-radius:999px;min-width:20px;height:20px;padding:0 5px;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;border:2px solid var(--bg)}
.cart-count.zero{display:none}
.paste-banner{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-top:1px solid var(--brd);border-bottom:2px dashed var(--accent);cursor:pointer;font-family:'DM Sans',sans-serif;background:var(--surf2);color:var(--accent);padding:13px 20px;font-size:.82rem;font-weight:700;transition:background .15s}
.paste-banner:hover{background:rgba(232,255,71,.06)}
.paste-banner svg{width:15px;height:15px;flex-shrink:0}
.sync-bar{font-size:.72rem;color:var(--txm);padding:5px 20px;text-align:right;background:var(--surf);border-bottom:1px solid var(--brd);display:none}
.sync-bar.show{display:block}
#filtros-bar{background:var(--bg);padding:10px 20px 8px;border-bottom:1px solid var(--brd);box-shadow:0 8px 14px -10px rgba(0,0,0,.6)}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.bar-search-row{margin-bottom:8px}
.bar-filters-row{margin-bottom:0}
.search-wrap{position:relative;flex:1;min-width:130px}
.search-wrap input{width:100%;background:var(--surf2);border:1px solid var(--brd2);color:var(--tx);padding:7px 32px 7px 10px;border-radius:6px;font-size:16px;outline:none;font-family:'DM Sans',sans-serif}
.search-wrap input:focus{border-color:var(--acc)}
.search-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--txm);cursor:pointer;font-size:16px;padding:0;display:none}
.il-select{background:var(--surf2);border:1px solid var(--brd2);color:var(--tx);padding:6px 10px;border-radius:6px;font-size:.78rem;outline:none;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;max-width:170px}
.il-select:focus{border-color:var(--acc)}
.vb{background:var(--surf2);border:1px solid var(--brd2);color:var(--txm);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:.78rem;transition:all .2s;font-family:'DM Sans',sans-serif}
.limpiar-btn{color:var(--red);border-color:rgba(255,77,77,.3)}
.limpiar-btn:hover{background:rgba(255,77,77,.1);color:var(--red);border-color:var(--red)}
.view-toggle{display:flex;align-items:center;gap:6px;margin-left:auto}
.view-toggle-label{font-size:.7rem;color:var(--txm);font-weight:600}
.vb-icon{background:var(--surf2);border:1px solid var(--brd2);color:var(--txm);width:30px;height:30px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.vb-icon svg{width:16px;height:16px}
.vb-icon.on,.vb-icon:hover{background:var(--acc);color:#fff;border-color:var(--acc)}
#tab-main{padding:14px 20px 100px}
@media(max-width:480px){
  header{padding:10px 14px}
  header h1{font-size:.95rem}
  header p{display:none}
  #filtros-bar{padding:8px 14px 6px}
  .il-select{max-width:120px;font-size:.72rem}
  .bar-filters-row{flex-wrap:wrap}
  #tab-main{padding:10px 14px 100px}
}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px}
@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr);gap:8px}}
.ci{background:var(--surf2);border:1px solid rgba(255,107,53,.3);border-radius:var(--radius);overflow:hidden;position:relative;transition:transform .15s}
.ci:hover{transform:translateY(-2px)}
.ci.agotado{opacity:.38;filter:grayscale(.7)}
.imgw{background:#050510;display:flex;align-items:center;justify-content:center;min-height:125px;overflow:hidden;position:relative}
.imgw::before{content:'';position:absolute;inset:0;background:linear-gradient(115deg,transparent 30%,rgba(180,210,255,.18) 42%,rgba(255,200,240,.32) 48%,rgba(190,255,230,.18) 54%,transparent 66%);z-index:1;pointer-events:none;mix-blend-mode:screen;background-size:220% 220%;background-position:0% 0%;animation:revShine 3.2s ease-in-out infinite}
@keyframes revShine{0%{background-position:0% 0%}50%{background-position:100% 100%}100%{background-position:0% 0%}}
.imgw img{width:100%;height:auto;display:block;position:relative;z-index:0}
.ph{color:var(--txm);font-size:.71rem;text-align:center;padding:10px;line-height:1.5}
.agotado-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(20,10,10,.88);border:1px solid rgba(255,80,80,.5);color:#ff8080;font-family:'Syne',sans-serif;font-size:.78rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:7px 16px;border-radius:20px;z-index:3;pointer-events:none}
.vbdg{position:absolute;top:5px;right:5px;padding:2px 6px;border-radius:8px;font-size:.65rem;font-weight:700;z-index:2;background:#3a1505;border:1px solid #7a3a18;color:#ff8c5a}
.info{padding:8px 9px 10px}
.pn{font-weight:700;font-size:.85rem;margin-bottom:2px}
.sn{font-size:.71rem;color:var(--txm);margin:1px 0}
.cn{font-family:monospace;font-size:.71rem;color:var(--gold);margin-bottom:6px}
.lang-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.lang-btn{font-size:.74rem;padding:4px 10px;border-radius:14px;cursor:pointer;border:1px solid var(--brd2);background:transparent;color:var(--txm);font-family:'DM Sans',sans-serif;transition:all .15s;font-weight:600}
.lang-btn.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.lang-btn.agotado-lang{opacity:.35;text-decoration:line-through;cursor:not-allowed}
.precio-row{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.precio-val{font-size:.9rem;font-weight:700;color:var(--accent);font-family:'Syne',sans-serif}
.precio-unit{font-size:.65rem;color:var(--txm);margin-bottom:1px}
.qty-wrap{display:flex;align-items:center;gap:5px}
.qty-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--brd2);background:var(--surf);color:var(--tx);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.qty-btn:hover{border-color:var(--accent);color:var(--accent)}
.qty-btn:disabled{opacity:.3;cursor:not-allowed}
.qty-num{font-size:13px;font-weight:700;min-width:18px;text-align:center}
.stk-disp{font-size:.64rem;color:var(--txm);margin-top:2px}
.tbl-scroll{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:.83rem}
.tbl th{text-align:left;color:var(--txm);font-weight:600;padding:7px 10px;border-bottom:2px solid var(--brd2);font-size:.75rem;text-transform:uppercase;letter-spacing:.04em;background:var(--surf)}
.tbl td{padding:7px 10px;border-bottom:1px solid var(--brd);vertical-align:middle}
.tbl tr:hover td{background:rgba(255,255,255,.03)}
.tbl .lang-btn{font-size:.68rem;padding:2px 7px}
.nores{text-align:center;padding:30px;color:var(--txm)}
.listado-banner{display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(124,92,191,.14);border:1px solid var(--acc);border-radius:9px;padding:10px 14px;margin-bottom:14px;font-size:.8rem;color:#cdb8ff}
.listado-banner button{background:var(--surf2);border:1px solid var(--brd2);color:var(--tx);padding:5px 11px;border-radius:7px;font-size:.74rem;cursor:pointer;font-family:'DM Sans',sans-serif}
.listado-banner button:hover{border-color:var(--acc);color:#fff}
.no-enc-box{background:rgba(255,77,77,.08);border:1px solid rgba(255,77,77,.3);border-radius:9px;padding:10px 14px;margin-bottom:14px;font-size:.8rem}
.no-enc-box .titulo{color:var(--red);font-weight:700;margin-bottom:6px}
.no-enc-box .texto{color:var(--txm);font-size:.78rem;line-height:1.6;word-break:break-word;cursor:text;user-select:all}
#carrito-panel,#paste-panel{position:fixed;inset:0;z-index:200;display:none}
#carrito-panel.show,#paste-panel.show{display:flex}
#paste-panel{z-index:210}
.cart-overlay{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(2px)}
.cart-drawer{position:absolute;right:0;top:0;bottom:0;width:min(440px,100vw);background:linear-gradient(180deg,#15142b,#0f0e1f);border-left:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;overflow:hidden;box-shadow:-12px 0 40px rgba(0,0,0,.5)}
.paste-drawer{position:absolute;right:0;top:0;bottom:0;width:min(420px,100vw);background:var(--surf);border-left:1px solid var(--brd2);display:flex;flex-direction:column;overflow:hidden}
.cart-head{padding:18px 22px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cart-head h2{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800}
.cart-close{background:none;border:1px solid var(--brd2);color:var(--txm);font-size:1.1rem;cursor:pointer;padding:4px 10px;border-radius:7px;line-height:1.3}
.cart-close:hover{color:var(--tx);background:var(--surf2)}
.cart-items{flex:1;overflow-y:auto;padding:14px 18px}
.cart-item{background:var(--surf2);border:1px solid var(--brd);border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.cart-item img{width:46px;border-radius:6px;flex-shrink:0}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:.85rem;font-weight:700;margin-bottom:2px;font-family:'Syne',sans-serif}
.cart-item-meta{font-size:.68rem;color:var(--txm)}
.cart-item-price{font-size:.86rem;font-weight:700;color:var(--gold);white-space:nowrap}
.cart-remove{background:none;border:none;color:var(--txm);cursor:pointer;font-size:1rem;padding:3px 7px;border-radius:5px;flex-shrink:0}
.cart-remove:hover{color:var(--red);background:rgba(255,77,77,.1)}
.cart-footer{padding:18px 22px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
.cart-total{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.cart-total-label{font-size:.8rem;color:var(--txm);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.cart-total-val{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--gold)}
.cart-ig-btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,var(--acc),#5c3fa0);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:.92rem;font-weight:800;cursor:pointer;text-align:center;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px rgba(124,92,191,.35)}
.cart-ig-btn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(124,92,191,.5)}
.cart-note{font-size:.72rem;color:var(--txm);text-align:center;margin-top:10px;line-height:1.5}
.cart-empty{text-align:center;padding:40px 20px;color:var(--txm);font-size:.9rem}
.paste-body{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.paste-hint{font-size:.78rem;color:var(--txm);line-height:1.5}
.paste-hint code{background:var(--surf2);padding:1px 5px;border-radius:4px;font-family:monospace;color:var(--gold)}
#paste-textarea{width:100%;min-height:140px;background:var(--surf2);border:1px solid var(--brd2);color:var(--tx);padding:10px 12px;border-radius:var(--radius-sm);font-size:16px;font-family:monospace;outline:none;resize:vertical}
#paste-textarea:focus{border-color:var(--acc)}
.paste-result-item{background:var(--surf2);border-radius:var(--radius-sm);padding:8px 10px;font-size:.8rem;margin-bottom:4px}
.paste-result-ok{color:var(--accent)}
.paste-result-fail{color:var(--red)}
.field{margin-bottom:14px}
.field label{display:block;font-size:.78rem;color:var(--txm);margin-bottom:5px;font-weight:600}
.req{color:var(--red);margin-left:2px}
.field input,.field select{width:100%;background:var(--surf2);border:1px solid var(--brd2);color:var(--tx);padding:10px 12px;border-radius:var(--radius-sm);font-size:16px;outline:none;font-family:'DM Sans',sans-serif}
.field input:focus,.field select:focus{border-color:var(--acc)}
.field-error{font-size:.72rem;color:var(--red);margin-top:5px;display:none}
.field-error.show{display:block}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ig-wrap,.cel-wrap{display:flex;align-items:center;background:var(--surf2);border:1px solid var(--brd2);border-radius:var(--radius-sm);overflow:hidden}
.ig-wrap:focus-within,.cel-wrap:focus-within{border-color:var(--acc)}
.ig-prefix,.cel-prefix{padding:10px 12px;color:var(--txm);font-size:.88rem;background:var(--surf);border-right:1px solid var(--brd2);white-space:nowrap;flex-shrink:0}
.ig-wrap input,.cel-wrap input{border:none;background:transparent;flex:1;padding:10px 12px;color:var(--tx);font-size:16px;outline:none;font-family:'DM Sans',sans-serif}
.toggle-group{display:flex;gap:8px;margin-bottom:6px}
.toggle-btn{flex:1;padding:11px;background:var(--surf2);border:1px solid var(--brd2);border-radius:var(--radius-sm);color:var(--txm);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;text-align:center}
.toggle-btn.active-retiro{background:rgba(71,255,178,.1);border-color:var(--green);color:var(--green)}
.toggle-btn.active-envio{background:rgba(124,92,191,.15);border-color:var(--acc);color:#b89cf0}
.section-retiro,.section-envio{display:none}
.section-retiro.show,.section-envio.show{display:block}
.retiro-info{background:rgba(71,255,178,.07);border:1px solid rgba(71,255,178,.2);border-radius:var(--radius-sm);padding:12px 14px;margin-top:12px;font-size:.78rem;color:var(--txm);line-height:1.6}
.retiro-info strong{color:var(--green)}
.checkout-divider{border-top:1px solid var(--brd);margin:16px 0 14px}
.checkout-title{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;color:var(--gold);margin-bottom:10px}
.checkout-back{background:none;border:1px solid var(--brd2);color:var(--txm);padding:9px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:.82rem;font-family:'DM Sans',sans-serif}
.checkout-submit{flex:1;padding:13px;background:var(--accent);color:var(--accent-text);border:none;border-radius:var(--radius-sm);font-family:'Syne',sans-serif;font-size:.92rem;font-weight:800;cursor:pointer}
.checkout-submit:disabled{opacity:.5;cursor:not-allowed}
.checkout-row-btns{display:flex;gap:8px;margin-top:16px}
.success-box{text-align:center;padding:40px 20px}
.success-box .ok-icon{font-size:2.4rem;margin-bottom:10px}
.success-box h3{font-family:'Syne',sans-serif;color:var(--accent);font-size:1.05rem;margin-bottom:8px}
.success-box p{font-size:.85rem;color:var(--txm);line-height:1.6}
</style>
</head>
<body>
<div id="fixed-top">
<header>
  <div class="head-left">
    <div class="brand-icon">
      <img src="https://cdn.jsdelivr.net/gh/PaldeaGames/Carpeta-151_XY@main/logo.png" onerror="this.style.display='none'" alt="PG">
    </div>
    <div>
      <h1>151 XY</h1>
      <p>Scarlet &amp; Violet 151 · Reverse Holo · ENG / ESP / POR</p>
    </div>
  </div>
  <button class="head-cart-btn" onclick="abrirCarrito()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    Carrito <span class="cart-count zero" id="cart-count">0</span>
  </button>
</header>
<button class="paste-banner" onclick="abrirPaste()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
  Para buscar más rápido, pega aquí tu listado
</button>
<div class="sync-bar" id="syncBar"></div>
<div id="filtros-bar"></div>
</div>

<div id="tab-main"></div>

<div id="carrito-panel">
  <div class="cart-overlay" onclick="cerrarCarrito()"></div>
  <div class="cart-drawer">
    <div class="cart-head"><h2 id="cart-head-title">Tu carrito</h2><button class="cart-close" onclick="cerrarCarrito()">×</button></div>
    <div class="cart-items" id="cart-body"></div>
    <div class="cart-footer" id="cart-footer-zone">
      <div class="cart-total"><span class="cart-total-label">Total</span><span class="cart-total-val" id="cart-total">$0</span></div>
      <button class="cart-ig-btn" id="cart-checkout-btn" onclick="irACheckout()">Continuar pedido</button>
      <div class="cart-note">Completa tus datos y te contactamos por Instagram para coordinar el pago.</div>
    </div>
  </div>
</div>

<div id="paste-panel">
  <div class="cart-overlay" onclick="cerrarPaste()"></div>
  <div class="paste-drawer">
    <div class="cart-head"><h2>Buscar por listado</h2><button class="cart-close" onclick="cerrarPaste()">×</button></div>
    <div class="paste-body">
      <div class="paste-hint">Pega tu lista, una carta por línea. Ej: <code>Gengar</code> o <code>Pikachu x2</code></div>
      <textarea id="paste-textarea" placeholder="Gengar&#10;Pikachu&#10;Mewtwo&#10;..."></textarea>
      <div id="paste-resultado"></div>
    </div>
    <div class="cart-footer">
      <button class="cart-ig-btn" onclick="procesarPaste()">Buscar y filtrar</button>
    </div>
  </div>

function skey(nombre,idioma){ return nombre.toLowerCase()+'|reverse|'+idioma; }
function clp(n){ return '$\u00a0'+Math.round(n).toLocaleString('es-CL'); }


function actualizarHorasRetiroXY(){
  var dia=document.getElementById('ck-dia').value;
  var sel=document.getElementById('ck-hora');
  if(!sel) return;
  var max=(dia==='Sábado')?'14:00':'18:00';
  var todas=['10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00'];
  var html='<option value="">Elige</option>';
  todas.forEach(function(h){ if(h<=max) html+='<option>'+h+'</option>'; });
  sel.innerHTML=html;
}

async function syncGAS(){
  var bar=document.getElementById('syncBar');
  bar.className='sync-bar show'; bar.textContent='Cargando precios y stock...';
  try{
    var resp=await fetch(GAS_URL+'?carpeta=XY');
    var data=await resp.json();
    if(data.ok&&data.data){
      STOCK={};PRICES={};
      data.data.forEach(function(item){
        var nom=item.nombre.trim().toLowerCase();
        if((item.rareza||'').toLowerCase()!=='reverse') return;
        IDIOMAS.forEach(function(idm){
          var k=idm.toLowerCase();
          var stk=item['stk_'+k]||0;
          var prc=item['prc_'+k]||0;
          if(stk>0) STOCK[skey(nom,idm)]=(STOCK[skey(nom,idm)]||0)+stk;
          if(prc>0) PRICES[skey(nom,idm)]=prc;
        });
      });
      GAS_LOADED=true;
      var now=new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
      bar.textContent='Precios actualizados — '+now;
      setTimeout(function(){bar.className='sync-bar';},4000);
      renderAll();
    }
  }catch(e){
    bar.textContent='Error al cargar precios';
    setTimeout(function(){bar.className='sync-bar';},3000);
  }
}

function getStock(card,idioma){ return STOCK[skey(card.name,idioma)]||0; }
function getPrecio(card,idioma){ return PRICES[skey(card.name,idioma)]||0; }

function idiomasConStock(card){
  return IDIOMAS.filter(function(idm){ return getStock(card,idm)>0; });
}
function idiomaActivo(card){
  if(CARD_IDIOMA[card.id]) return CARD_IDIOMA[card.id];
  var disp=idiomasConStock(card);
  return disp.length?disp[0]:'ENG';
}
function setIdioma(cardId,idioma){
  CARD_IDIOMA[cardId]=idioma;
  document.querySelectorAll('[data-cid="'+cardId+'"]').forEach(function(w){
    w.innerHTML=buildCardHtml(CARDS.find(function(c){return c.id===cardId;}));
  });
}

function setLangF(v){LANGF=v;renderAll();}
function setDISPF(v){DISPF=v;renderAll();}
function setORDF(v){ORDF=v;renderAll();}

// ── Render ───────────────────────────────────────────────────
function filtered(){
  var q=QF.toLowerCase();
  var base=LISTADO_IDS?CARDS.filter(function(c){return LISTADO_IDS.indexOf(c.id)>=0;}):CARDS;
  var rows=base.filter(function(c){
    var mQ=!q||c.name.toLowerCase().indexOf(q)>=0||c.num.indexOf(q)>=0;
    var mT=!TIPOF||c.tipo===TIPOF;
    var mL=!LANGF||!GAS_LOADED||getStock(c,LANGF)>0;
    var hayStock=IDIOMAS.some(function(idm){return getStock(c,idm)>0;});
    var mD=!GAS_LOADED||(DISPF==='con'?hayStock:DISPF==='sin'?!hayStock:true);
    return mQ&&mT&&mL&&mD;
  });
  if(ORDF==='num') rows=rows.slice().sort(function(a,b){return parseInt(a.num)-parseInt(b.num);});
  else if(ORDF==='az') rows=rows.slice().sort(function(a,b){return a.name.localeCompare(b.name);});
  else if(ORDF==='precio-asc'||ORDF==='precio-desc'){
    rows=rows.slice().sort(function(a,b){
      var pA=getPrecio(a,idiomaActivo(a));
      var pB=getPrecio(b,idiomaActivo(b));
      if(ORDF==='precio-asc') return pA===0?1:pB===0?-1:pA-pB;
      return pB===0?-1:pA===0?1:pB-pA;
    });
  }
  return rows;
}

function buildCardHtml(card){
  if(!card) return '';
  var idioma=idiomaActivo(card);
  var disp=GAS_LOADED?idiomasConStock(card):[];
  var stk=GAS_LOADED?getStock(card,idioma):0;
  var precio=GAS_LOADED?getPrecio(card,idioma):0;
  var agotado=GAS_LOADED&&stk===0;
  var imgHtml=card.img
    ?'<img src="'+card.img+'" alt="'+card.name+'" loading="lazy" onerror="this.onerror=null;this.parentElement.innerHTML=\'<div class=&quot;ph&quot;>'+card.name+'</div>\'">'
    :'<div class="ph">'+card.name+'</div>';
  var langHtml='';
  if(GAS_LOADED&&(disp.length>1||(disp.length===1&&disp[0]!==idioma))){
    langHtml='<div class="lang-row">';
    IDIOMAS.forEach(function(idm){
      var s=getStock(card,idm);
      if(s===0&&disp.indexOf(idm)<0) return;
      var act=idioma===idm;
      langHtml+='<button class="lang-btn'+(act?' active':'')+(s===0?' agotado-lang':'')+'"'
        +(s>0?' onclick="setIdioma('+card.id+',\''+idm+'\')"':' disabled')+'>'
        +IDIOMA_NOMBRES[idm]+'</button>';
    });
    langHtml+='</div>';
  }
  var enCarrito=CARRITO.find(function(c){return c.cardId===card.id&&c.idioma===idioma;});
  var qty=enCarrito?enCarrito.qty:0;
  var precioHtml='';
  if(GAS_LOADED&&!agotado){
    precioHtml='<div class="precio-row">'
      +'<div><div class="precio-val">'+(precio>0?clp(precio):'Sin precio')+'</div>'
      +'<div class="stk-disp">'+stk+' disponible'+(stk!==1?'s':'')+'</div></div>'
      +'<div class="qty-wrap">'
      +'<button class="qty-btn" onclick="cambiarQty('+card.id+','+(qty>0?-1:0)+',\''+idioma+'\')" '+(qty===0?'disabled':'')+'>-</button>'
      +'<span class="qty-num" style="color:'+(qty>0?'var(--accent)':'var(--txm)')+'">'+qty+'</span>'
      +'<button class="qty-btn" onclick="cambiarQty('+card.id+',1,\''+idioma+'\')" '+(qty>=stk||precio===0?'disabled':'')+'>+</button>'
      +'</div></div>';
  }
  return '<div class="ci'+(agotado?' agotado':'')+'">'
    +'<div class="imgw">'+imgHtml+(agotado?'<div class="agotado-center">Agotado</div>':'')+'</div>'
    +'<span class="vbdg">\u2B21 Reverse</span>'
    +'<div class="info">'
    +'<div class="pn">'+card.name+'</div>'
    +'<div class="cn">#'+card.num+'</div>'
    +'<div class="sn">Scarlet &amp; Violet 151</div>'
    +langHtml+precioHtml
    +'</div></div>';
}

function renderGrid(rows,cont){
  var h='<div class="grid">';
  rows.forEach(function(c){h+='<div data-cid="'+c.id+'">'+buildCardHtml(c)+'</div>';});
  h+='</div>';
  cont.innerHTML=h;
}

function renderTable(rows,cont){
  var h='<div class="tbl-scroll"><table class="tbl"><thead><tr>'
    +'<th>Img</th><th>Carta</th><th>#</th><th>Tipo</th>'
    +(GAS_LOADED?'<th>Idioma</th><th>Precio</th><th>Carrito</th>':'')
    +'</tr></thead><tbody>';
  rows.forEach(function(c){
    var idioma=idiomaActivo(c);
    var stk=GAS_LOADED?getStock(c,idioma):0;
    var prc=GAS_LOADED?getPrecio(c,idioma):0;
    var agotado=GAS_LOADED&&stk===0;
    var imgHtml=c.img?'<img src="'+c.img+'" style="width:44px;border-radius:4px" loading="lazy">':'—';
    var ti=TIPO_INFO[c.tipo]||{icon:'?'};
    var langCell='',precCell='—',cartCell='';
    if(GAS_LOADED){
      IDIOMAS.forEach(function(idm){
        var s=getStock(c,idm);
        if(s===0) return;
        langCell+='<button class="lang-btn'+(idioma===idm?' active':'')+'" onclick="setIdioma('+c.id+',\''+idm+'\')">'+IDIOMA_NOMBRES[idm]+'</button> ';
      });
      precCell=prc>0?clp(prc):'Sin precio';
      if(!agotado&&stk>0&&prc>0){
        var en=CARRITO.find(function(x){return x.cardId===c.id&&x.idioma===idioma;});
        var q=en?en.qty:0;
        cartCell='<div class="qty-wrap">'
          +'<button class="qty-btn" onclick="cambiarQty('+c.id+','+(q>0?-1:0)+',\''+idioma+'\')" '+(q===0?'disabled':'')+'>-</button>'
          +'<span class="qty-num">'+q+'</span>'
          +'<button class="qty-btn" onclick="cambiarQty('+c.id+',1,\''+idioma+'\')" '+(q>=stk?'disabled':'')+'>+</button></div>';
      }
    }
    h+='<tr data-cid="'+c.id+'">'
      +'<td>'+imgHtml+'</td>'
      +'<td><strong>'+c.name+'</strong></td>'
      +'<td style="font-family:monospace;color:var(--gold)">#'+c.num+'</td>'
      +'<td style="font-size:.7rem">'+ti.icon+' '+c.tipo+'</td>'
      +(GAS_LOADED?'<td>'+(langCell||'—')+'</td><td>'+precCell+'</td><td>'+cartCell+'</td>':'')
      +'</tr>';
  });
  h+='</tbody></table></div>';
  cont.innerHTML=h;
}

function renderAll(){
  var cont=document.getElementById('tab-main');
  if(!cont) return;
  var rows=filtered();
  var extraHtml='';
  if(LISTADO_IDS){
    extraHtml+='<div class="listado-banner"><span>'+LISTADO_RESUMEN+'</span><button onclick="limpiarListado()">Quitar filtro</button></div>';
    if(NO_ENCONTRADOS_GLOBAL&&NO_ENCONTRADOS_GLOBAL.length>0){
      extraHtml+='<div class="no-enc-box"><div class="titulo">\u2717 No disponibles ('+NO_ENCONTRADOS_GLOBAL.length+') — selecciona para copiar:</div>'
        +'<div class="texto">'+NO_ENCONTRADOS_GLOBAL.join(', ')+'</div></div>';
    }
  }
  if(!rows.length){cont.innerHTML=extraHtml+'<div class="nores">Sin resultados</div>';ajustarOffset();return;}
  var gridHtml='';
  if(VM==='table'){
    var tmp=document.createElement('div');
    renderTable(rows,tmp);
    gridHtml=tmp.innerHTML;
  } else {
    gridHtml='<div class="grid">';
    rows.forEach(function(c){gridHtml+='<div data-cid="'+c.id+'">'+buildCardHtml(c)+'</div>';});
    gridHtml+='</div>';
  }
  cont.innerHTML=extraHtml+gridHtml;
  ajustarOffset();
}

function ajustarOffset(){
  var ft=document.getElementById('fixed-top');
  var tm=document.getElementById('tab-main');
  if(ft&&tm) tm.style.paddingTop=(ft.offsetHeight+4)+'px';
}

// ── Carrito ──────────────────────────────────────────────────
function cambiarQty(cardId,delta,idioma){
  var card=CARDS.find(function(c){return c.id===cardId;});
  if(!card) return;
  var stk=getStock(card,idioma);
  var precio=getPrecio(card,idioma);
  var idx=CARRITO.findIndex(function(c){return c.cardId===cardId&&c.idioma===idioma;});
  if(idx>=0){
    var nueva=CARRITO[idx].qty+delta;
    if(nueva<=0) CARRITO.splice(idx,1);
    else CARRITO[idx].qty=Math.min(nueva,stk);
  } else if(delta>0&&precio>0&&stk>0){
    CARRITO.push({cardId:cardId,nombre:card.name,variante:'Reverse',idioma:idioma,precio:precio,qty:1,img:card.img,num:card.num});
  }
  actualizarCarritoBtn();
  document.querySelectorAll('[data-cid="'+cardId+'"]').forEach(function(w){
    w.innerHTML=buildCardHtml(card);
  });
}

function actualizarCarritoBtn(){
  var total=CARRITO.reduce(function(s,c){return s+c.qty;},0);
  var cnt=document.getElementById('cart-count');
  cnt.textContent=total;
  cnt.className='cart-count'+(total===0?' zero':'');
  if(document.getElementById('carrito-panel').classList.contains('show')) renderCarritoPanel();
}

function abrirCarrito(){CHECKOUT_VIEW='cart';document.getElementById('carrito-panel').classList.add('show');renderCarritoPanel();}
function cerrarCarrito(){document.getElementById('carrito-panel').classList.remove('show');}

function renderCarritoPanel(){
  if(CHECKOUT_VIEW==='cart') renderVistaCarrito();
  else if(CHECKOUT_VIEW==='form') renderVistaFormulario();
  else renderVistaExito();
}

function renderVistaCarrito(){
  document.getElementById('cart-head-title').textContent='Tu carrito';
  var body=document.getElementById('cart-body');
  var footer=document.getElementById('cart-footer-zone');
  footer.style.display='block';
  if(!CARRITO.length){
    body.innerHTML='<div class="cart-empty">Tu carrito está vacío.</div>';
    document.getElementById('cart-total').textContent='$0';
    document.getElementById('cart-checkout-btn').style.display='none';
    return;
  }
  document.getElementById('cart-checkout-btn').style.display='block';
  var total=0,h='';
  CARRITO.forEach(function(c){
    var sub=c.precio*c.qty; total+=sub;
    h+='<div class="cart-item">';
    if(c.img) h+='<img src="'+c.img+'" alt="'+c.nombre+'">';
    h+='<div class="cart-item-info">'
      +'<div class="cart-item-name">'+c.nombre+'</div>'
      +'<div class="cart-item-meta">Reverse · '+IDIOMA_NOMBRES[c.idioma]+' · #'+c.num+'</div>'
      +'<div style="font-size:.72rem;color:var(--txm);margin-top:2px">'+clp(c.precio)+' × '+c.qty+'</div>'
      +'</div>'
      +'<div style="text-align:right;flex-shrink:0">'
      +'<div class="cart-item-price">'+clp(sub)+'</div>'
      +'<div class="qty-wrap" style="margin-top:4px;justify-content:flex-end">'
      +'<button class="qty-btn" onclick="cambiarQtyCart('+c.cardId+',\''+c.idioma+'\',-1)">-</button>'
      +'<span class="qty-num">'+c.qty+'</span>'
      +'<button class="qty-btn" onclick="cambiarQtyCart('+c.cardId+',\''+c.idioma+'\',1)">+</button>'
      +'</div></div>'
      +'<button class="cart-remove" onclick="quitarCart('+c.cardId+',\''+c.idioma+'\')">×</button>'
      +'</div>';
  });
  body.innerHTML=h;
  document.getElementById('cart-total').textContent=clp(total);
}

function cambiarQtyCart(cardId,idioma,delta){cambiarQty(cardId,delta,idioma);}
function quitarCart(cardId,idioma){
  var idx=CARRITO.findIndex(function(c){return c.cardId===cardId&&c.idioma===idioma;});
  if(idx>=0) CARRITO.splice(idx,1);
  actualizarCarritoBtn();
  document.querySelectorAll('[data-cid="'+cardId+'"]').forEach(function(w){
    var card=CARDS.find(function(c){return c.id===cardId;});
    if(card) w.innerHTML=buildCardHtml(card);
  });
}

function irACheckout(){if(!CARRITO.length)return;CHECKOUT_VIEW='form';renderCarritoPanel();}
function volverAlCarrito(){CHECKOUT_VIEW='cart';renderCarritoPanel();}

  document.getElementById('cart-body').innerHTML=
    '<div class="field"><label>Nombre y apellido <span class="req">*</span></label><input type="text" id="ck-nombre" placeholder="Ej: María Pérez"><div class="field-error" id="err-ck-nombre">Ingresa tu nombre.</div></div>'

    +'<div class="field"><label>Correo electrónico <span class="req">*</span></label><input type="email" id="ck-correo" placeholder="tu@email.com"><div class="field-error" id="err-ck-correo">Ingresa un correo válido.</div></div>'
    +'<div class="checkout-divider"></div>'
    +'<div class="checkout-title">¿Cómo lo recibes?</div>'
    +'<div class="toggle-group"><button class="toggle-btn" id="ck-btnRetiro" onclick="setEntrega(\'retiro\')">Retiro en persona</button><button class="toggle-btn" id="ck-btnEnvio" onclick="setEntrega(\'envio\')">Envío a todo Chile</button></div>'

    +'<div class="field"><label>Hora <span class="req">*</span></label><select id="ck-hora"><option value="">Elige</option></select><div class="field-error" id="err-ck-hora">Elige una hora.</div></div>'
    +'</div></div>'
    +'<div class="section-envio" id="ck-secEnvio">'

    +'<div class="field"><label>Celular <span class="req">*</span></label><div class="cel-wrap"><span class="cel-prefix">+569</span><input type="tel" id="ck-celular" placeholder="12345678" maxlength="8" inputmode="numeric" oninput="this.value=this.value.replace(/\\D/g,\'\').slice(0,8)"></div><div class="field-error" id="err-ck-celular">Ingresa 8 dígitos.</div></div></div>'

    +'</div>'

function setEntrega(modo){
  entregaMode=modo;
  document.getElementById('ck-btnRetiro').className='toggle-btn'+(modo==='retiro'?' active-retiro':'');
  document.getElementById('ck-btnEnvio').className='toggle-btn'+(modo==='envio'?' active-envio':'');
  document.getElementById('ck-secRetiro').className='section-retiro'+(modo==='retiro'?' show':'');
  document.getElementById('ck-secEnvio').className='section-envio'+(modo==='envio'?' show':'');
}
function formatRut(el){
  var v=el.value.replace(/[^0-9kK]/g,'');
  if(v.length<2){el.value=v;return;}
  el.value=v.slice(0,-1).replace(/\B(?=(\d{3})+(?!\d))/g,'.')+'-'+v.slice(-1);
}
function ckVal(id){var e=document.getElementById(id);return e?e.value.trim():'';}
function ckErr(id,s){var e=document.getElementById('err-'+id);if(e)e.className='field-error'+(s?' show':'');}

function validarForm(){
  var ok=true;
  if(!ckVal('ck-nombre')){ckErr('ck-nombre',true);ok=false;}else ckErr('ck-nombre',false);
  if(!ckVal('ck-usuario')){ckErr('ck-usuario',true);ok=false;}else ckErr('ck-usuario',false);
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(ckVal('ck-correo'))){ckErr('ck-correo',true);ok=false;}else ckErr('ck-correo',false);
  if(!entregaMode){ckErr('ck-entrega',true);ok=false;}else ckErr('ck-entrega',false);
  if(entregaMode==='retiro'){
    if(!ckVal('ck-dia')){ckErr('ck-dia',true);ok=false;}else ckErr('ck-dia',false);
    if(!ckVal('ck-hora')){ckErr('ck-hora',true);ok=false;}else ckErr('ck-hora',false);
  }
  if(entregaMode==='envio'){
    if(!ckVal('ck-rut')||ckVal('ck-rut').length<5){ckErr('ck-rut',true);ok=false;}else ckErr('ck-rut',false);
    if(!/^\d{8}$/.test(ckVal('ck-celular'))){ckErr('ck-celular',true);ok=false;}else ckErr('ck-celular',false);
    if(!ckVal('ck-direccion')){ckErr('ck-direccion',true);ok=false;}else ckErr('ck-direccion',false);
  }
  return ok;
}

async function enviarPedido(){
  if(!validarForm()) return;
  var btn=document.getElementById('ck-submit');
  btn.disabled=true;btn.textContent='Enviando...';
  var orderItems=CARRITO.map(function(c){
    return {nombre:c.nombre,set:'sv3pt5',numero:c.num,rareza:'Reverse',idioma:c.idioma,cantidad:c.qty,precio_clp:c.precio,subtotal:c.precio*c.qty};
  });
  var total=orderItems.reduce(function(s,i){return s+i.subtotal;},0);
  var orderData={carpeta:'XY',cliente:ckVal('ck-nombre'),instagram:'@'+ckVal('ck-usuario').replace('@',''),correo:ckVal('ck-correo'),items:orderItems,entrega:entregaMode,
    dia:entregaMode==='retiro'?ckVal('ck-dia'):null,hora:entregaMode==='retiro'?ckVal('ck-hora'):null,
    rut:entregaMode==='envio'?ckVal('ck-rut'):null,celular:entregaMode==='envio'?'+569'+ckVal('ck-celular'):null,
    direccion:entregaMode==='envio'?ckVal('ck-direccion'):null};
  try{
    await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(orderData)});
    window.LAST_ORDER_ID='XY-0001';
    CARRITO=[];
    LISTADO_IDS=null;LISTADO_RESUMEN=null;NO_ENCONTRADOS_GLOBAL=[];
    CHECKOUT_VIEW='success';
    actualizarCarritoBtn();
    renderAll();
    renderCarritoPanel();
  }catch(e){
    alert('Error de conexión. Intenta de nuevo.');
    btn.disabled=false;btn.textContent='Enviar pedido';
  }
}

function renderVistaExito(){
  document.getElementById('cart-head-title').textContent='Pedido enviado';
  document.getElementById('cart-footer-zone').style.display='none';
  document.getElementById('cart-body').innerHTML=
    '<div class="success-box"><div class="ok-icon">✓</div>'
    +'<h3>Pedido '+(window.LAST_ORDER_ID||'')+'</h3>'
    +'<p>Te contactaremos por Instagram para confirmar y coordinar el pago.</p>'
    +'<button class="checkout-back" style="margin-top:18px" onclick="cerrarCarrito()">Cerrar</button></div>';
}

// ── Paste listado ────────────────────────────────────────────
function abrirPaste(){document.getElementById('paste-panel').classList.add('show');document.getElementById('paste-resultado').innerHTML='';}
function cerrarPaste(){document.getElementById('paste-panel').classList.remove('show');}

function procesarPaste(){
  var raw=document.getElementById('paste-textarea').value;
  var lineas=raw.indexOf('\n')>=0?raw.split('\n'):raw.split(',');
  lineas=lineas.map(function(l){return l.trim().replace(/[xX,]\s*\d+$/,'').replace(/,+$/,'').trim();}).filter(Boolean);
  if(!lineas.length) return;
  var encontrados=[],noEncontrados=[];
  lineas.forEach(function(nom){
    var nomLow=nom.toLowerCase();
    var matches=CARDS.filter(function(c){return c.name.toLowerCase()===nomLow;});
    if(!matches.length) matches=CARDS.filter(function(c){return c.name.toLowerCase().indexOf(nomLow)>=0;});
    if(matches.length){matches.forEach(function(c){if(encontrados.indexOf(c.id)<0)encontrados.push(c.id);});}
    else noEncontrados.push(nom);
  });
  var res=document.getElementById('paste-resultado');
  var h='<div class="paste-result-item"><span class="paste-result-ok">✓ '+encontrados.length+' carta(s) encontrada(s)</span></div>';
  if(noEncontrados.length) h+='<div class="paste-result-item"><span class="paste-result-fail">✗ No encontradas ('+noEncontrados.length+'): '+noEncontrados.join(', ')+'</span></div>';
  res.innerHTML=h;
  NO_ENCONTRADOS_GLOBAL=noEncontrados;
  LISTADO_IDS=encontrados;
  LISTADO_RESUMEN=encontrados.length+' carta(s) de tu listado'+(noEncontrados.length?' · '+noEncontrados.length+' no disponibles':'');
  setTimeout(function(){cerrarPaste();renderAll();},noEncontrados.length?2000:800);
}

function limpiarListado(){
  LISTADO_IDS=null;LISTADO_RESUMEN=null;NO_ENCONTRADOS_GLOBAL=[];renderAll();
}

// ── Init ─────────────────────────────────────────────────────
document.addEventListener('wheel',function(e){if(e.ctrlKey)e.preventDefault();},{passive:false});
document.addEventListener('keydown',function(e){if(e.ctrlKey&&(e.key==='+'||e.key==='-'||e.key==='='||e.key==='0'))e.preventDefault();});
window.addEventListener('error',function(e){if(e.message&&e.message.includes('ResizeObserver'))e.stopImmediatePropagation();});

if(window.ResizeObserver){
  new ResizeObserver(function(){requestAnimationFrame(ajustarOffset);}).observe(document.getElementById('fixed-top'));
}

window.addEventListener('load',function(){
  buildFiltrosBar();
  renderAll();
  requestAnimationFrame(function(){ajustarOffset();});
  syncGAS();
});
</script>
